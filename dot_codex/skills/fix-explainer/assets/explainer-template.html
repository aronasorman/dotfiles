<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f1e8;
      --paper: #fffdf8;
      --ink: #172024;
      --muted: #556166;
      --line: #c9c2b5;
      --accent: #075f66;
      --accent-soft: #dceeee;
      --code: #11191d;
      --code-ink: #edf4f2;
      --code-muted: #9fb0ad;
      --focus: #2c635d;
      --proposed: #6c3e00;
      --proposed-soft: #fff0cf;
      --verified: #075f3e;
      --not-run: #704700;
      --unsupported: #8a2533;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--page);
    }

    main {
      width: min(94rem, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3.5rem 0 5rem;
    }

    .page-header,
    .section-card,
    .evidence-card,
    .proposed-fix,
    .takeaway {
      border: 1px solid var(--line);
      border-radius: 0.75rem;
      background: var(--paper);
      box-shadow: 0 0.35rem 1.25rem rgb(23 32 36 / 7%);
    }

    .page-header {
      padding: clamp(1.5rem, 4vw, 3.25rem);
      border-top: 0.35rem solid var(--accent);
    }

    h1,
    h2,
    h3,
    p,
    dl,
    ol,
    ul,
    pre {
      margin-top: 0;
    }

    h1 {
      max-width: 26ch;
      margin-bottom: 0.5rem;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      font-size: clamp(2.1rem, 5vw, 4.5rem);
      font-weight: 650;
      line-height: 1.02;
      letter-spacing: -0.035em;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      line-height: 1.2;
    }

    h3 {
      margin-bottom: 0.25rem;
      font-size: 1.05rem;
    }

    .eyebrow {
      margin-bottom: 0.55rem;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .content-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1.25rem;
      margin-top: 1.25rem;
    }

    .content-stack > * {
      min-width: 0;
    }

    .section-card,
    .takeaway {
      padding: clamp(1.25rem, 3vw, 2rem);
    }

    .problem-facts,
    .context-grid,
    .verification-list {
      display: grid;
      gap: 1rem;
    }

    .problem-facts {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 0;
    }

    .problem-facts > div,
    .context-panel,
    .verification-item {
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      background: #fff;
    }

    dt,
    .label {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.055em;
      text-transform: uppercase;
    }

    dd,
    .context-panel p,
    .verification-item p {
      margin: 0;
    }

    .context-grid {
      grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.2fr);
    }

    .flow-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-bottom: 0;
      padding: 0;
      list-style: none;
      counter-reset: flow;
    }

    .flow-list li {
      display: flex;
      align-items: center;
      max-width: 100%;
      gap: 0.45rem;
      padding: 0.45rem 0.65rem;
      border-radius: 999px;
      background: var(--accent-soft);
      counter-increment: flow;
      overflow-wrap: anywhere;
    }

    .flow-list li::before {
      content: counter(flow);
      display: inline-grid;
      width: 1.35rem;
      height: 1.35rem;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: var(--accent);
      font-size: 0.72rem;
      font-weight: 800;
    }

    .evidence-list {
      display: grid;
      gap: 1.25rem;
    }

    .evidence-card {
      display: grid;
      grid-template-columns: minmax(15rem, 21rem) minmax(0, 1fr);
      overflow: hidden;
    }

    .evidence-narrative {
      padding: 1.5rem;
      border-right: 1px solid var(--line);
    }

    .source-heading {
      margin-bottom: 0.25rem;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1rem;
    }

    .line-range {
      margin-bottom: 1.25rem;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .smig-list {
      display: grid;
      gap: 0.9rem;
      margin-bottom: 0;
    }

    .smig-list dd {
      font-size: 0.94rem;
    }

    .code-column {
      min-width: 0;
      background: var(--code);
    }

    .code-window,
    .proposed-code {
      overflow-x: auto;
      overscroll-behavior-inline: contain;
    }

    .code-window {
      padding: 1rem 0;
      color: var(--code-ink);
      font: 0.88rem/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .code-line {
      display: grid;
      grid-template-columns: 1.1rem minmax(3rem, auto) minmax(max-content, 1fr);
      min-width: max-content;
      padding: 0 1.15rem 0 0.7rem;
      border-left: 0.22rem solid transparent;
    }

    .code-line.is-focus {
      border-left-color: #77d6ca;
      background: var(--focus);
    }

    .focus-marker {
      color: #a8fff3;
      user-select: text;
    }

    .line-number {
      padding-right: 1.2rem;
      color: var(--code-muted);
      text-align: right;
      user-select: text;
    }

    .source-text {
      padding-right: 1.5rem;
      white-space: pre;
    }

    .proposed-fix {
      overflow: hidden;
      border-color: #d1a44d;
    }

    .proposed-header {
      padding: 1.4rem 1.5rem;
      color: #4b2d00;
      background: var(--proposed-soft);
      border-bottom: 1px solid #d1a44d;
    }

    .proposed-header .eyebrow {
      color: var(--proposed);
    }

    .proposed-header h2,
    .proposed-header p:last-child {
      margin-bottom: 0;
    }

    .proposed-body {
      display: grid;
      grid-template-columns: minmax(15rem, 21rem) minmax(0, 1fr);
    }

    .proposed-narrative {
      padding: 1.5rem;
      border-right: 1px solid var(--line);
    }

    .proposed-narrative dl,
    .proposed-narrative ul {
      margin-bottom: 0;
    }

    .proposed-narrative dd + dt {
      margin-top: 1rem;
    }

    .proposed-narrative ul {
      padding-left: 1.15rem;
    }

    .proposed-code {
      margin: 0;
      padding: 1.25rem;
      color: var(--code-ink);
      background: var(--code);
      font: 0.88rem/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre;
    }

    .code-label {
      display: block;
      padding: 0.65rem 1.25rem;
      color: #f6e3b8;
      background: #2a2114;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .verification-list {
      grid-template-columns: minmax(0, 1fr);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .verification-list > *,
    .verification-item > * {
      min-width: 0;
    }

    .verification-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.9rem;
      align-items: start;
    }

    .verification-item h3,
    .verification-item p {
      overflow-wrap: anywhere;
    }

    .status {
      display: inline-block;
      min-width: 6.5rem;
      padding: 0.3rem 0.55rem;
      border: 1px solid currentcolor;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
    }

    .status-verified {
      color: var(--verified);
      background: #ddf3e7;
    }

    .status-not_run {
      color: var(--not-run);
      background: #fff1cf;
    }

    .status-unsupported {
      color: var(--unsupported);
      background: #fde7eb;
    }

    .verification-result {
      margin-top: 0.55rem !important;
      color: var(--muted);
    }

    .takeaway {
      border-left: 0.35rem solid var(--accent);
    }

    .takeaway p:last-child {
      max-width: 62ch;
      margin-bottom: 0;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      font-size: clamp(1.25rem, 2.5vw, 1.8rem);
      line-height: 1.35;
    }

    @media (max-width: 800px) {
      main {
        width: min(100% - 1rem, 48rem);
        padding: 1rem 0 2rem;
      }

      .problem-facts,
      .context-grid,
      .evidence-card,
      .proposed-body {
        grid-template-columns: 1fr;
      }

      .evidence-narrative,
      .proposed-narrative {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .verification-item {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      :root {
        --page: #fff;
        --paper: #fff;
      }

      body {
        background: #fff;
      }

      main {
        width: 100%;
        padding: 0;
      }

      .page-header,
      .section-card,
      .evidence-card,
      .proposed-fix,
      .takeaway {
        box-shadow: none;
        break-inside: avoid;
      }

      .code-window,
      .proposed-code {
        overflow: visible;
        white-space: pre-wrap;
      }

      .source-text {
        white-space: pre-wrap;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <p class="eyebrow">Fix explainer</p>
      <h1>{{TITLE}}</h1>
    </header>
    <div class="content-stack">
      {{PROBLEM}}
      {{CONTEXT}}
      {{EVIDENCE}}
      {{PROPOSED_FIX}}
      {{VERIFICATION}}
      {{TAKEAWAY}}
    </div>
  </main>
</body>
</html>
